# Rspamd override: DKIM signing configuration
# Place your DKIM private keys in the dkim_keys volume.
# Key path convention: /var/lib/rspamd/dkim/<domain>.<selector>.key

# To generate a key:
#   rspamadm dkim_keygen -s mail -d example.com \
#     -k /var/lib/rspamd/dkim/example.com.mail.key > /tmp/example.com.mail.txt
# Then publish the TXT record from the output file.

# Enable DKIM signing for outbound mail
enabled = true;

# Sign for any domain we host; key path is derived from domain + selector
sign_local = true;
sign_authenticated = true;

# Use per-domain keys: /var/lib/rspamd/dkim/<domain>.<selector>.key
path = "/var/lib/rspamd/dkim/$domain.$selector.key";
selector = "mail";        # CHANGE: match your DNS selector

# Only sign if key file exists (skip if domain not configured)
try_fallback = false;

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyBeam Mail</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <!-- Login View -->
    <div id="login-view">
        <div class="login-card">
            <div class="logo">
                <i data-feather="send"></i>
                SkyBeam
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="input-glass" placeholder="alice@skybeam.live" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="input-glass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
                <div id="login-error"></div>
            </form>
        </div>
    </div>

    <!-- Main App View -->
    <div id="app-view">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo" style="margin-bottom: 1.5rem; font-size: 1.5rem;">
                    <i data-feather="send"></i>
                    SkyBeam
                </div>
                <button class="compose-btn">
                    <i data-feather="edit-2" style="width: 16px; height: 16px;"></i>
                    New Message
                </button>
                <button class="compose-btn hidden" id="admin-btn" style="margin-top: 10px; background: var(--bg-tertiary); color: var(--text-primary); box-shadow: none;">
                    <i data-feather="settings" style="width: 16px; height: 16px;"></i>
                    Administration
                </button>
            </div>
            <ul class="folder-list" id="folder-list">
                <!-- Populated by JS -->
            </ul>
        </aside>

        <!-- Message List -->
        <section class="message-pane">
            <div class="pane-header">
                <h2 id="current-folder-name">Inbox</h2>
                <div class="search-box">
                    <i data-feather="search" style="width: 16px; height: 16px; z-index: 10;"></i>
                    <input type="text" id="search-input" placeholder="Search mail...">
                </div>
            </div>
            <div class="message-list" id="message-list">
                <!-- Populated by JS -->
            </div>
        </section>

        <!-- Reading Pane -->
        <main class="reading-pane">
            <div class="empty-state" id="reader-empty">
                <i data-feather="mail" style="width: 48px; height: 48px;"></i>
                <h3>Select an item to read</h3>
                <p>Click on a message in the list to view its contents.</p>
            </div>
            
            <div class="reader-content hidden" id="reader-content">
                <div class="reader-header">
                    <h1 class="reader-subject" id="reader-subject">Subject</h1>
                    <div class="reader-meta">
                        <div class="reader-sender">
                            <div class="avatar" id="reader-avatar">A</div>
                            <div class="sender-details">
                                <span class="sender-name" id="reader-from-name">Name</span>
                                <span class="sender-email" id="reader-from-email">email@example.com</span>
                            </div>
                        </div>
                        <div class="reader-actions">
                            <span class="msg-date" id="reader-date" style="margin-right: 12px;">Date</span>
                            <button class="icon-btn" title="Reply"><i data-feather="corner-up-left"></i></button>
                            <button class="icon-btn" title="Forward"><i data-feather="corner-up-right"></i></button>
                            <button class="icon-btn" title="Delete"><i data-feather="trash-2"></i></button>
                        </div>
                    </div>
                </div>
                <div class="reader-body" id="reader-body">
                    <!-- Body content -->
                </div>
            </div>
        </main>
    </div>

    <!-- Admin View -->
    <div id="admin-view" class="hidden" style="position:absolute; top:0; left:0; width:100%; height:100%; background:var(--bg-primary); z-index:50; display:flex;">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Admin Control</h2>
                <button id="close-admin-btn" class="icon-btn" style="margin-top: 1rem;"><i data-feather="x"></i></button>
            </div>
            <ul class="folder-list">
                <li class="folder-item active" id="tab-domains">Domains</li>
                <li class="folder-item" id="tab-accounts">Mailboxes</li>
            </ul>
        </aside>
        <main class="reading-pane" style="padding: 3rem;">
            <!-- Domains Section -->
            <section id="admin-domains-sec">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2>Managed Domains</h2>
                    <button id="add-domain-btn" class="btn-primary" style="width: auto;">+ Add Domain</button>
                </div>
                <div id="domains-list" style="display: grid; gap: 1rem;"></div>
            </section>

            <!-- Accounts Section -->
            <section id="admin-accounts-sec" class="hidden">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2>Mailboxes</h2>
                    <button id="add-account-btn" class="btn-primary" style="width: auto;">+ Create Mailbox</button>
                </div>
                <div id="accounts-list" style="display: grid; gap: 1rem;"></div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
    <script>
        feather.replace();
    </script>
</body>
</html>
